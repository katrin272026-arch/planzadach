<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Планировщик задач</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__title">
      <h1>Планировщик задач</h1>
    </div>

    <nav class="view-switcher" aria-label="Переключатель режимов">
      <button class="view-switcher__button is-active" type="button" id="view-day" aria-pressed="true">День</button>
      <button class="view-switcher__button" type="button" id="view-week" aria-pressed="false">Неделя</button>
      <button class="view-switcher__button" type="button" id="view-month" aria-pressed="false">Месяц</button>
    </nav>

    <button class="primary-button" type="button" id="add-task-button">Добавить</button>
  </header>

  <main class="app-main">
    <section class="date-navigation" aria-label="Навигация по датам">
      <button class="icon-button" type="button" id="previous-date-button" aria-label="Предыдущая дата">‹</button>
      <h2 class="date-navigation__title" id="current-date-title">Сегодня</h2>
      <button class="icon-button" type="button" id="next-date-button" aria-label="Следующая дата">›</button>
      <button class="secondary-button date-navigation__today" type="button" id="today-button">Сегодня</button>
    </section>

    <section class="tasks-section" aria-labelledby="current-date-title">
      <div class="tasks-container" id="tasks-container" aria-live="polite"></div>
    </section>

    <section class="settings-section" aria-labelledby="settings-title">
      <h2 class="settings-section__title" id="settings-title">Настройки</h2>
      <div class="settings-actions">
        <button class="secondary-button" type="button" id="export-data-button">Экспорт</button>
        <label class="secondary-button file-import-button" for="import-data-input">Импорт</label>
        <input class="visually-hidden" type="file" id="import-data-input" accept="application/json,.json">
        <button class="secondary-button" type="button" id="clear-completed-button">Очистить завершенные</button>
        <button class="secondary-button danger-button" type="button" id="delete-all-data-button">Удалить все данные</button>
      </div>
    </section>
  </main>

  <div class="modal is-hidden" id="task-modal" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
    <div class="modal__backdrop" id="task-modal-backdrop"></div>
    <section class="modal__content">
      <header class="modal__header">
        <h2 id="task-modal-title">Новая задача</h2>
        <button class="icon-button" type="button" id="close-task-modal-button" aria-label="Закрыть окно">×</button>
      </header>

      <form class="task-form" id="task-form" novalidate>
        <label class="field" for="task-text">
          <span class="field__label">Текст задачи</span>
          <input class="field__control" type="text" id="task-text" name="text" required autocomplete="off">
        </label>

        <div class="form-row">
          <label class="field" for="task-date">
            <span class="field__label">Дата</span>
            <input class="field__control" type="date" id="task-date" name="date" required>
          </label>

          <label class="field" for="task-time">
            <span class="field__label">Время</span>
            <input class="field__control" type="time" id="task-time" name="time">
          </label>
        </div>

        <label class="checkbox-field" for="task-important">
          <input type="checkbox" id="task-important" name="important">
          <span>Важная задача</span>
        </label>

        <label class="field" for="task-recurrence">
          <span class="field__label">Повторение</span>
          <select class="field__control" id="task-recurrence" name="recurrence">
            <option value="none">Не повторять</option>
            <option value="daily">Каждый день</option>
            <option value="weekdays">По будням</option>
            <option value="weekly">Каждую неделю</option>
            <option value="monthly">Каждый месяц</option>
          </select>
        </label>

        <footer class="form-actions">
          <button class="secondary-button" type="button" id="cancel-task-button">Отмена</button>
          <button class="primary-button" type="submit" id="save-task-button">Сохранить</button>
        </footer>
      </form>
    </section>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/recurrence.js"></script>
  <script src="js/render.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/import-export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
